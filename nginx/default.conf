server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50M;

    location = /misp {
        return 308 /misp/;
    }

    location ^~ /misp/ {
        proxy_pass http://misp-core/;
        proxy_http_version 1.1;
        proxy_set_header Accept-Encoding "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /misp;

        proxy_redirect http://localhost/misp/ /misp/;
        proxy_redirect http://localhost/ /misp/;
        proxy_redirect http://misp-core/ /misp/;
        proxy_redirect https://misp-core/ /misp/;

        proxy_hide_header Link;
        sub_filter_once off;
        sub_filter 'http://localhost/' 'http://localhost/misp/';
        sub_filter "baseurl = 'http://localhost'" "baseurl = 'http://localhost/misp'";
        sub_filter 'baseurl = "http://localhost"' 'baseurl = "http://localhost/misp"';
        sub_filter 'data-current-page="/' 'data-current-page="/misp/';
        sub_filter 'href="/' 'href="/misp/';
        sub_filter 'src="/' 'src="/misp/';
        sub_filter 'action="/' 'action="/misp/';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
